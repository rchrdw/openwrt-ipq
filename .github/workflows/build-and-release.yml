name: Build and Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Select the branch to build'
        required: true
        default: 'main-nss'
        type: choice
        options:
          - main-nss
          - 24.10-nss
  push:
    branches:
      - main-nss
  pull_request:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # container:
    #   image: openwrt/sdk
    #   # image: openwrt/imagebuilder:latest
    #   # volumes:
    #   #   - ${{ github.workspace }}:/home/build/openwrt
    #   options: --user root
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        # with:
        #   repository: 'qosmio/openwrt-ipq'
        #   path: openwrt-ipq
        #   ref: 'main-nss'
          # ref: '24.10-nss'
          # ref: ${{ github.event.inputs.branch || '24.10-nss' }}

      # Install build dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update && \
          sudo apt install -y build-essential \
          clang \
          flex \
          bison \
          g++ \
          gawk \
          gcc-multilib \
          g++-multilib \
          gettext \
          git \
          libncurses-dev \
          libssl-dev \
          python3-setuptools \
          rsync \
          swig \
          unzip \
          zlib1g-dev \
          file \
          wget && \
          sudo apt-get clean


      - name: Get short SHA
        id: sha
        run: echo "::set-output name=sha::$(git rev-parse --short HEAD)"

      - name: Prepare config
        run: |
          cp nss-setup/config-nss.seed .config
          echo "CONFIG_TARGET_qualcommax_ipq807x_DEVICE_linksys_mx4300=y" >> .config

      - name: Update feeds
        run: |
          ./scripts/feeds update
          ./scripts/feeds install -a

      - name: Make config
        run: make defconfig V=s

      - name: download dependendies
        run: make download -j$(nproc) V=s

      - name: Build
        run:  make -j$(nproc) V=s

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}-${{ steps.sha.outputs.sha }}
          release_name: Release ${{ github.ref_name }}-${{ steps.sha.outputs.sha }}
          draft: false
          prerelease: false

      - name: Upload Release Asset (sysupgrade)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./bin/targets/qualcommax/ipq807x/openwrt-qualcommax-ipq807x-linksys_mx4300-squashfs-sysupgrade.bin
          asset_name: openwrt-qualcommax-ipq807x-linksys_mx4300-squashfs-sysupgrade.bin
          asset_content_type: application/octet-stream

      - name: Upload Release Asset (factory)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./bin/targets/qualcommax/ipq807x/openwrt-qualcommax-ipq807x-linksys_mx4300-squashfs-factory.bin
          asset_name: openwrt-qualcommax-ipq807x-linksys_mx4300-squashfs-factory.bin
          asset_content_type: application/octet-stream

      - name: Upload Release Asset (initramfs)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./bin/targets/qualcommax/ipq807x/openwrt-qualcommax-ipq807x-initramfs-uImage.itb
          asset_name: openwrt-qualcommax-ipq807x-initramfs-uImage.itb
          asset_content_type: application/octet-stream

      - name: Upload Release Asset (buildinfo)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./bin/targets/qualcommax/ipq807x/config.buildinfo
          asset_name: config.buildinfo
          asset_content_type: text/plain

      - name: Upload Release Asset (device manifest)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./bin/targets/qualcommax/ipq807x/openwrt-qualcommax-ipq807x-linksys_mx4300.manifest
          asset_name: openwrt-qualcommax-ipq807x-linksys_mx4300.manifest
          asset_content_type: text/plain
